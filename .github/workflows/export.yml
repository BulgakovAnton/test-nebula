name: Prepare export branch for Space

on:
  pull_request:
    branches:
      - master-jetforcer
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Feature branch to export'
        required: true
        type: string

concurrency:
  group: export-${{ github.event.pull_request.head.ref || inputs.source_branch }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      CLEAN_BASE: origin/master
      DEV_BASE: origin/master-jetforcer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Fetch required branches
        run: |
          set -euo pipefail
          git fetch origin master master-jetforcer --prune

      - name: Configure git identity
        run: |
          git config user.name "Writerside Export Bot"
          git config user.email "writerside-export-bot@jetbrains.space"

      - name: Resolve source branch and exact head SHA
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SOURCE_BRANCH="${{ inputs.source_branch }}"
            git fetch origin "${SOURCE_BRANCH}"
            SOURCE_SHA="$(git rev-parse "origin/${SOURCE_BRANCH}")"
          else
            SOURCE_BRANCH="${{ github.head_ref }}"
            SOURCE_SHA="${{ github.event.pull_request.head.sha }}"
            git fetch origin "${SOURCE_BRANCH}"
          fi

          EXPORT_BRANCH="export/${SOURCE_BRANCH}"

          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "export_branch=${EXPORT_BRANCH}" >> "$GITHUB_OUTPUT"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Source SHA: ${SOURCE_SHA}"
          echo "Export branch: ${EXPORT_BRANCH}"

      - name: Verify .github was not changed in feature branch
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_SHA="${{ steps.source.outputs.source_sha }}"

          if git diff --name-only "${DEV_BASE}...${SOURCE_SHA}" -- .github | grep .; then
            echo "ERROR: .github was changed in feature branch"
            exit 1
          fi

          echo ".github was not changed"

      - name: Collect feature commits
        id: commits
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_SHA="${{ steps.source.outputs.source_sha }}"
          MERGE_BASE="$(git merge-base "${DEV_BASE}" "${SOURCE_SHA}")"
          COMMITS="$(git rev-list --reverse --no-merges "${MERGE_BASE}..${SOURCE_SHA}")"

          if [ -z "${COMMITS}" ]; then
            echo "No feature commits to export"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_commits=true"
            echo "commits<<EOF"
            echo "${COMMITS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create temporary clean branch from master
        if: steps.commits.outputs.has_commits == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B "tmp-export-${GITHUB_RUN_ID}" "${CLEAN_BASE}"

      - name: Cherry-pick commits onto temporary clean branch
        if: steps.commits.outputs.has_commits == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            echo "Cherry-picking $commit"

            if git cherry-pick "$commit"; then
              echo "Cherry-pick applied: $commit"
              continue
            fi

            echo "Cherry-pick reported conflicts for: $commit"

            unmerged="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "$unmerged" ]; then
              while IFS= read -r path; do
                [ -z "$path" ] && continue
                echo "Resolving conflicted path: $path"
                git checkout --theirs -- "$path" || true
                git add -- "$path" || true
              done <<< "$unmerged"
            fi

            if git cherry-pick --continue; then
              echo "Cherry-pick auto-resolved: $commit"
            else
              echo "Cherry-pick failed with real conflict: $commit"
              git status
              exit 1
            fi
          done <<< "${{ steps.commits.outputs.commits }}"

      - name: Final safety checks
        if: steps.commits.outputs.has_commits == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git ls-tree -r --name-only HEAD | grep '^.github/'; then
            echo "ERROR: .github exists in export branch"
            exit 1
          fi

          echo "Export branch is clean"

      - name: Publish export branch
        if: steps.commits.outputs.has_commits == 'true'
        shell: bash
        run: |
          set -euo pipefail

          EXPORT_BRANCH="${{ steps.source.outputs.export_branch }}"
          git branch -f "${EXPORT_BRANCH}" HEAD
          git push --force origin "HEAD:${EXPORT_BRANCH}"