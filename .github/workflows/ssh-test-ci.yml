name: CI / Writerside Tests

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  MAIN_REPO_OWNER: borlander
  STARDUST_REPO: test-stardust
  NEBULA_REPO: test-nebula

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Resolve current branch and repository
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          CURRENT_REPO="${GITHUB_REPOSITORY#*/}"

          if [[ "$CURRENT_REPO" == "${STARDUST_REPO}" ]]; then
            SECOND_REPO="${NEBULA_REPO}"
          elif [[ "$CURRENT_REPO" == "${NEBULA_REPO}" ]]; then
            SECOND_REPO="${STARDUST_REPO}"
          else
            echo "Unsupported repository: $CURRENT_REPO"
            exit 1
          fi

          echo "branch=$BRANCH"              >> "$GITHUB_OUTPUT"
          echo "current_repo=$CURRENT_REPO"  >> "$GITHUB_OUTPUT"
          echo "second_repo=$SECOND_REPO"    >> "$GITHUB_OUTPUT"

          echo "Current repo: $CURRENT_REPO"
          echo "Second repo:  $SECOND_REPO"
          echo "Branch:       $BRANCH"

      - name: Setup SSH keys
        shell: bash
        env:
          CI_STARDUST_SSH_KEY: ${{ secrets.CI_STARDUST_SSH_KEY }}
          CI_NEBULA_SSH_KEY: ${{ secrets.CI_NEBULA_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Записываем ключи
          echo "${CI_STARDUST_SSH_KEY}" > ~/.ssh/ci_stardust_key
          echo "${CI_NEBULA_SSH_KEY}"   > ~/.ssh/ci_nebula_key
          chmod 600 ~/.ssh/ci_stardust_key
          chmod 600 ~/.ssh/ci_nebula_key

          # SSH config — разные хосты для разных ключей
          cat > ~/.ssh/config << 'EOF'
          Host github-stardust
            HostName github.com
            User git
            IdentityFile ~/.ssh/ci_stardust_key
            IdentitiesOnly yes

          Host github-nebula
            HostName github.com
            User git
            IdentityFile ~/.ssh/ci_nebula_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          echo "✅ SSH keys configured"

      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ steps.context.outputs.current_repo == env.STARDUST_REPO && secrets.CI_STARDUST_SSH_KEY || secrets.CI_NEBULA_SSH_KEY }}
          path: wrs/${{ steps.context.outputs.current_repo }}
          fetch-depth: 0

      - name: Resolve branch for second repository
        id: second_branch
        shell: bash
        run: |
          set -euo pipefail

          SECOND_REPO="${{ steps.context.outputs.second_repo }}"
          REQUESTED_BRANCH="${{ steps.context.outputs.branch }}"

          if [[ "$SECOND_REPO" == "${NEBULA_REPO}" ]]; then
            SSH_HOST="github-nebula"
          else
            SSH_HOST="github-stardust"
          fi

          REMOTE_URL="git@${SSH_HOST}:${MAIN_REPO_OWNER}/${SECOND_REPO}.git"

          if git ls-remote --exit-code --heads "$REMOTE_URL" "$REQUESTED_BRANCH" >/dev/null 2>&1; then
            RESOLVED_BRANCH="$REQUESTED_BRANCH"
            echo "✅ Found matching branch: $REQUESTED_BRANCH"
          else
            RESOLVED_BRANCH="master"
            echo "⚠️ Branch not found, falling back to master"
          fi

          echo "resolved_branch=$RESOLVED_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout second repository
        shell: bash
        run: |
          set -euo pipefail

          SECOND_REPO="${{ steps.context.outputs.second_repo }}"
          RESOLVED_BRANCH="${{ steps.second_branch.outputs.resolved_branch }}"

          if [[ "$SECOND_REPO" == "${NEBULA_REPO}" ]]; then
            SSH_HOST="github-nebula"
          else
            SSH_HOST="github-stardust"
          fi

          REMOTE_URL="git@${SSH_HOST}:${MAIN_REPO_OWNER}/${SECOND_REPO}.git"

          echo "Cloning $SECOND_REPO branch: $RESOLVED_BRANCH"
          git clone \
            --branch "$RESOLVED_BRANCH" \
            --depth 1 \
            "$REMOTE_URL" \
            "wrs/${SECOND_REPO}"

          echo "✅ Cloned $SECOND_REPO"

      - name: Verify workspace layout
        shell: bash
        run: |
          set -euo pipefail
          test -d "wrs/stardust"
          test -d "wrs/nebula"
          echo "✅ Workspace layout:"
          ls -la "wrs/"

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show Java and Gradle versions
        shell: bash
        working-directory: wrs/stardust
        run: |
          set -euo pipefail
          java -version
          ./gradlew --version

      - name: Run tests
        shell: bash
        working-directory: wrs/stardust
#        env:
#          GRADLE_OPTS: -Dorg.gradle.daemon=false
#          ORG_GRADLE_PROJECT_spaceDownloadWRSFE: ${{ secrets.SPACE_DOWNLOAD_WRSFE }}
        run: |
          set -euo pipefail
          ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          retention-days: 14
          path: |
            wrs/stardust/**/build/test-results/**
            wrs/stardust/**/build/reports/tests/**
            wrs/stardust/**/build/reports/problems/**